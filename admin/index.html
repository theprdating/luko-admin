<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Luko Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">

      <div class="login-logo">
        <h1>LUKO</h1>
        <p>管理後台</p>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@luko.app" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>

      <button id="login-btn" class="btn-primary" style="width:100%;margin-top:4px;padding:12px;">
        登入
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // Redirect if already logged in as admin
    db.auth.getSession().then(({ data: { session } }) => {
      if (session?.user?.user_metadata?.user_role === 'admin') {
        window.location.href = 'dashboard.html'
      }
    })

    // Show error from redirect
    const urlParams = new URLSearchParams(window.location.search)
    if (urlParams.get('error') === 'unauthorized') {
      const el = document.getElementById('error-msg')
      el.textContent = '您沒有管理員權限'
      el.classList.remove('hidden')
    }

    // ── Brute force protection ─────────────────────────────────────────────────
    // Client-side lockout: 5 failed attempts → 60 second cooldown.
    // Supabase Auth also enforces server-side rate limiting independently.
    let failedAttempts = 0
    let lockoutUntil   = 0

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('login-btn')
      const errorEl  = document.getElementById('error-msg')

      errorEl.classList.add('hidden')

      // Check lockout
      if (Date.now() < lockoutUntil) {
        const secs = Math.ceil((lockoutUntil - Date.now()) / 1000)
        errorEl.textContent = `嘗試次數過多，請 ${secs} 秒後再試`
        errorEl.classList.remove('hidden')
        return
      }

      if (!email || !password) {
        errorEl.textContent = '請輸入 Email 和密碼'
        errorEl.classList.remove('hidden')
        return
      }

      btn.textContent = '登入中...'
      btn.disabled = true

      const { data, error } = await db.auth.signInWithPassword({ email, password })

      if (error || !data.user) {
        failedAttempts++
        if (failedAttempts >= 5) {
          lockoutUntil = Date.now() + 60000
          errorEl.textContent = '嘗試次數過多，請 60 秒後再試'
        } else {
          errorEl.textContent = `登入失敗（${failedAttempts}/5 次）`
        }
        errorEl.classList.remove('hidden')
        btn.textContent = '登入'
        btn.disabled = false
        return
      }

      failedAttempts = 0  // reset on success

      if (data.user.user_metadata?.user_role !== 'admin') {
        await db.auth.signOut()
        errorEl.textContent = '您沒有管理員權限'
        errorEl.classList.remove('hidden')
        btn.textContent = '登入'
        btn.disabled = false
        return
      }

      window.location.href = 'dashboard.html'
    })

    // Enter to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click()
    })
  </script>
</body>
</html>
