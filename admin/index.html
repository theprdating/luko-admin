<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>PR Dating Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">

      <div class="login-logo">
        <h1>PR DATING</h1>
        <p>管理後台</p>
      </div>

      <div id="error-msg"  class="error-msg hidden"></div>
      <div id="success-msg" class="error-msg hidden"
           style="background:rgba(44,110,78,0.15);border-color:#2C6E4E;color:#6FCFA4;"></div>

      <!-- ── View 1: 一般登入 ── -->
      <div id="view-login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@luko.app" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">密碼</label>
          <input type="password" id="password" autocomplete="current-password">
        </div>
        <button id="login-btn" class="btn-primary" style="width:100%;padding:12px;margin-bottom:12px;">
          登入
        </button>
        <p style="text-align:center;font-size:11px;color:var(--text-second);margin-top:12px;line-height:1.6;">
          僅限授權管理員登入。<br>忘記密碼請聯繫系統管理員。
        </p>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // ── View 切換 ──────────────────────────────────────────────────────────────
    function showView(name) {
      ['login'].forEach(v => {
        document.getElementById(`view-${v}`).classList.toggle('hidden', v !== name)
      })
      document.getElementById('error-msg').classList.add('hidden')
      document.getElementById('success-msg').classList.add('hidden')
    }

    function showError(msg) {
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.classList.remove('hidden')
      document.getElementById('success-msg').classList.add('hidden')
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg')
      el.textContent = msg
      el.classList.remove('hidden')
      document.getElementById('error-msg').classList.add('hidden')
    }

    // ── 初始化：已登入直接跳轉 ─────────────────────────────────────────────────
    async function checkSession() {
      const { data: { session } } = await db.auth.getSession()
      if (session?.user?.user_metadata?.user_role === 'admin') {
        window.location.href = 'dashboard.html'
      }

      const urlParams = new URLSearchParams(window.location.search)
      if (urlParams.get('error') === 'unauthorized') {
        showError('您沒有管理員權限')
      }
    }

    checkSession()

    // ── 登入 ───────────────────────────────────────────────────────────────────
    let failedAttempts = 0
    let lockoutUntil   = 0

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('login-btn')

      if (Date.now() < lockoutUntil) {
        const secs = Math.ceil((lockoutUntil - Date.now()) / 1000)
        showError(`嘗試次數過多，請 ${secs} 秒後再試`)
        return
      }
      if (!email || !password) { showError('請輸入 Email 和密碼'); return }

      btn.textContent = '登入中...'
      btn.disabled = true

      const { data, error } = await db.auth.signInWithPassword({ email, password })

      if (error || !data.user) {
        failedAttempts++
        if (failedAttempts >= 5) {
          lockoutUntil = Date.now() + 60000
          showError('嘗試次數過多，請 60 秒後再試')
        } else {
          showError(`登入失敗（${failedAttempts}/5 次）`)
        }
        btn.textContent = '登入'
        btn.disabled = false
        return
      }

      if (data.user.user_metadata?.user_role !== 'admin') {
        await db.auth.signOut()
        showError('您沒有管理員權限')
        btn.textContent = '登入'
        btn.disabled = false
        return
      }

      failedAttempts = 0
      window.location.href = 'dashboard.html'
    })

    // Enter 鍵送出
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-btn').click()
    })
  </script>
</body>
</html>
