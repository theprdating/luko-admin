<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>PR Dating Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">

      <div class="login-logo">
        <h1>PR DATING</h1>
        <p>管理後台</p>
      </div>

      <div id="error-msg"  class="error-msg hidden"></div>
      <div id="success-msg" class="error-msg hidden"
           style="background:rgba(44,110,78,0.15);border-color:#2C6E4E;color:#6FCFA4;"></div>

      <!-- ── View 1: 一般登入 ── -->
      <div id="view-login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@luko.app" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">密碼</label>
          <input type="password" id="password" autocomplete="current-password">
        </div>
        <button id="login-btn" class="btn-primary" style="width:100%;padding:12px;margin-bottom:12px;">
          登入
        </button>
        <div style="text-align:center;">
          <button onclick="showView('forgot')"
            style="background:none;border:none;color:var(--text-second);font-size:12px;cursor:pointer;padding:4px;">
            忘記密碼？
          </button>
        </div>
      </div>

      <!-- ── View 2: 忘記密碼 ── -->
      <div id="view-forgot" class="hidden">
        <p style="font-size:13px;color:var(--text-second);margin-bottom:16px;line-height:1.6;">
          輸入你的 Email，我們會寄一封重設密碼連結給你。
        </p>
        <div class="form-group">
          <label for="forgot-email">Email</label>
          <input type="email" id="forgot-email" placeholder="admin@luko.app">
        </div>
        <button id="forgot-btn" class="btn-primary" style="width:100%;padding:12px;margin-bottom:12px;">
          寄出重設連結
        </button>
        <div style="text-align:center;">
          <button onclick="showView('login')"
            style="background:none;border:none;color:var(--text-second);font-size:12px;cursor:pointer;padding:4px;">
            ← 返回登入
          </button>
        </div>
      </div>

      <!-- ── View 3: 設定新密碼（從重設信點進來） ── -->
      <div id="view-reset" class="hidden">
        <p style="font-size:13px;color:var(--text-second);margin-bottom:16px;">
          請輸入你的新密碼。
        </p>
        <div class="form-group">
          <label for="new-password">新密碼</label>
          <input type="password" id="new-password" placeholder="至少 8 個字元" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm-password">確認新密碼</label>
          <input type="password" id="confirm-password" autocomplete="new-password">
        </div>
        <button id="reset-btn" class="btn-primary" style="width:100%;padding:12px;">
          設定密碼
        </button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    // ── View 切換 ──────────────────────────────────────────────────────────────
    function showView(name) {
      ['login', 'forgot', 'reset'].forEach(v => {
        document.getElementById(`view-${v}`).classList.toggle('hidden', v !== name)
      })
      document.getElementById('error-msg').classList.add('hidden')
      document.getElementById('success-msg').classList.add('hidden')
    }

    function showError(msg) {
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.classList.remove('hidden')
      document.getElementById('success-msg').classList.add('hidden')
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg')
      el.textContent = msg
      el.classList.remove('hidden')
      document.getElementById('error-msg').classList.add('hidden')
    }

    // ── 偵測 URL hash（從密碼重設信點進來）────────────────────────────────────
    //
    // Supabase 密碼重設信點擊後，會在 URL hash 帶上：
    //   #access_token=...&refresh_token=...&type=recovery
    // 偵測到這個 → 顯示「設定新密碼」介面
    async function checkRecoveryToken() {
      const hash   = new URLSearchParams(window.location.hash.substring(1))
      const type   = hash.get('type')
      const access = hash.get('access_token')
      const refresh = hash.get('refresh_token')

      if (type === 'recovery' && access) {
        // 建立 session（讓後續的 updateUser 能驗證身份）
        const { error } = await db.auth.setSession({
          access_token:  access,
          refresh_token: refresh ?? '',
        })
        if (error) {
          showError('重設連結已失效，請重新申請。')
          return
        }
        // 清掉 URL hash 避免重整時重複觸發
        history.replaceState(null, '', window.location.pathname)
        showView('reset')
        return
      }

      // 一般情況：已登入直接跳轉
      const { data: { session } } = await db.auth.getSession()
      if (session?.user?.user_metadata?.user_role === 'admin') {
        window.location.href = 'dashboard.html'
      }

      // 錯誤參數檢查
      const urlParams = new URLSearchParams(window.location.search)
      if (urlParams.get('error') === 'unauthorized') {
        showError('您沒有管理員權限')
      }
    }

    checkRecoveryToken()

    // ── 登入 ───────────────────────────────────────────────────────────────────
    let failedAttempts = 0
    let lockoutUntil   = 0

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const btn      = document.getElementById('login-btn')

      if (Date.now() < lockoutUntil) {
        const secs = Math.ceil((lockoutUntil - Date.now()) / 1000)
        showError(`嘗試次數過多，請 ${secs} 秒後再試`)
        return
      }
      if (!email || !password) { showError('請輸入 Email 和密碼'); return }

      btn.textContent = '登入中...'
      btn.disabled = true

      const { data, error } = await db.auth.signInWithPassword({ email, password })

      if (error || !data.user) {
        failedAttempts++
        if (failedAttempts >= 5) {
          lockoutUntil = Date.now() + 60000
          showError('嘗試次數過多，請 60 秒後再試')
        } else {
          showError(`登入失敗（${failedAttempts}/5 次）`)
        }
        btn.textContent = '登入'
        btn.disabled = false
        return
      }

      if (data.user.user_metadata?.user_role !== 'admin') {
        await db.auth.signOut()
        showError('您沒有管理員權限')
        btn.textContent = '登入'
        btn.disabled = false
        return
      }

      failedAttempts = 0
      window.location.href = 'dashboard.html'
    })

    // ── 忘記密碼 ───────────────────────────────────────────────────────────────
    document.getElementById('forgot-btn').addEventListener('click', async () => {
      const email = document.getElementById('forgot-email').value.trim()
      const btn   = document.getElementById('forgot-btn')

      if (!email) { showError('請輸入 Email'); return }

      btn.textContent = '寄送中...'
      btn.disabled = true

      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/index.html',
      })

      btn.textContent = '寄出重設連結'
      btn.disabled = false

      if (error) { showError('寄送失敗：' + error.message); return }

      showSuccess('✓ 已寄出！請去信箱點擊重設連結（連結 1 小時內有效）')
    })

    // ── 設定新密碼 ─────────────────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', async () => {
      const newPw  = document.getElementById('new-password').value
      const confirm = document.getElementById('confirm-password').value
      const btn    = document.getElementById('reset-btn')

      if (!newPw || newPw.length < 8) {
        showError('密碼至少需要 8 個字元')
        return
      }
      if (newPw !== confirm) {
        showError('兩次輸入的密碼不一致')
        return
      }

      btn.textContent = '設定中...'
      btn.disabled = true

      const { data, error } = await db.auth.updateUser({ password: newPw })

      if (error) {
        showError('設定失敗：' + error.message)
        btn.textContent = '設定密碼'
        btn.disabled = false
        return
      }

      // 設定成功 → 確認是 admin 才進後台
      if (data.user?.user_metadata?.user_role === 'admin') {
        showSuccess('✓ 密碼設定成功！正在跳轉...')
        setTimeout(() => window.location.href = 'dashboard.html', 1200)
      } else {
        showSuccess('✓ 密碼設定成功！請用新密碼登入。')
        setTimeout(() => showView('login'), 1500)
      }
    })

    // Enter 鍵送出
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return
      const activeView = ['login','forgot','reset'].find(v =>
        !document.getElementById(`view-${v}`).classList.contains('hidden')
      )
      if (activeView === 'login')  document.getElementById('login-btn').click()
      if (activeView === 'forgot') document.getElementById('forgot-btn').click()
      if (activeView === 'reset')  document.getElementById('reset-btn').click()
    })
  </script>
</body>
</html>
