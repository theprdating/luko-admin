<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>PR Dating Admin — 審核</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <span class="navbar-brand">PR DATING ADMIN</span>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">儀表板</a>
      <a href="review.html" class="nav-link">審核</a>
      <a href="history.html" class="nav-link">紀錄</a>
      <button onclick="signOut()" class="btn-ghost" style="font-size:12px;padding:6px 12px;margin-left:8px;">登出</button>
    </div>
  </nav>

  <div id="toast-container"></div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>

  <!-- Two-column layout -->
  <div class="review-layout">

    <!-- ── Queue Panel ─────────────────────────────────────────────────────── -->
    <aside class="queue-panel">
      <div class="queue-header">
        <h2>待審核</h2>
        <div class="queue-count" id="queue-count">載入中...</div>
      </div>
      <div class="queue-tabs">
        <button class="queue-tab active" id="tab-first" onclick="switchTab('first')">
          首次申請 <span class="queue-tab-count" id="tab-count-first">0</span>
        </button>
        <button class="queue-tab" id="tab-reapply" onclick="switchTab('reapply')">
          重新申請 <span class="queue-tab-count" id="tab-count-reapply">0</span>
        </button>
      </div>
      <ul class="queue-list" id="queue-list">
        <li class="loading-state">
          <div class="loading-spinner"></div>
          載入中...
        </li>
      </ul>
    </aside>

    <!-- ── Detail Panel ────────────────────────────────────────────────────── -->
    <section class="detail-panel" id="detail-panel">
      <div class="detail-placeholder">
        ← 從左側選擇申請者開始審核
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    setActiveNavLink()

    // ── Constants ──────────────────────────────────────────────────────────────
    const MAX_ATTEMPTS = 3

    // ── State ──────────────────────────────────────────────────────────────────
    let queue            = []   // pending applications
    let selectedId       = null // current application id
    let currentVerify    = null // identity_verifications row
    let decisionMode     = null // 'approve' | 'reject'
    let selectedTier     = null // 'top' | 'standard'
    let selectedRejType  = null // 'soft' | 'hard'
    let reviewStartedAt  = null
    let isSubmitting     = false
    let currentTab       = 'first' // 'first' | 'reapply'

    // ── Live Review Timer ──────────────────────────────────────────────────────
    let _timerInterval   = null

    function startReviewTimer() {
      stopReviewTimer()
      _timerInterval = setInterval(() => {
        const el = document.getElementById('review-timer')
        if (!el || !reviewStartedAt) return
        const secs = Math.floor((Date.now() - new Date(reviewStartedAt).getTime()) / 1000)
        const mm = String(Math.floor(secs / 60)).padStart(2, '0')
        const ss = String(secs % 60).padStart(2, '0')
        el.textContent = `${mm}:${ss}`
        // 超過 2 分鐘變黃色提醒
        el.style.color = secs >= 120 ? 'var(--gold)' : 'var(--text-second)'
      }, 1000)
    }

    function stopReviewTimer() {
      if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null }
    }

    // ── Queue Auto-Refresh（每 45 秒靜默更新隊列數字）───────────────────────────
    setInterval(async () => {
      const { data } = await db
        .from('applications')
        .select('id', { count: 'exact', head: true })
        .eq('status', 'pending')
      if (data !== null) {
        // 只更新數字，不重新 render 完整 queue（避免打斷審核中的操作）
        const count = document.getElementById('queue-count')
        if (count) {
          const cur = queue.length
          // 如果後台有新增申請，重新 loadQueue
          const serverCount = data.length ?? 0
          if (serverCount > cur) loadQueue()
        }
      }
    }, 45000)

    // ── Init ───────────────────────────────────────────────────────────────────
    async function init() {
      await requireAdmin()
      await loadQueue()
    }

    // ── Load Queue ─────────────────────────────────────────────────────────────
    async function loadQueue() {
      const { data, error } = await db
        .from('applications')
        .select('id, user_id, display_name, birth_date, gender, created_at, application_count, photo_paths')
        .eq('status', 'pending')
        .order('created_at', { ascending: true })

      if (error) {
        showToast('無法載入佇列：' + error.message, 'error')
        return
      }

      queue = data || []
      renderQueue()

      const filtered = filteredQueue()
      if (filtered.length > 0 && !selectedId) {
        await selectApplicant(filtered[0].id)
      } else if (queue.length === 0) {
        document.getElementById('detail-panel').innerHTML =
          '<div class="detail-placeholder">✓ 目前沒有待審核的申請</div>'
      }
    }

    // ── Tab helpers ────────────────────────────────────────────────────────────
    function filteredQueue() {
      if (currentTab === 'first')   return queue.filter(a => (a.application_count || 1) <= 1)
      if (currentTab === 'reapply') return queue.filter(a => (a.application_count || 1) > 1)
      return queue
    }

    function switchTab(tab) {
      currentTab = tab
      document.getElementById('tab-first').classList.toggle('active',   tab === 'first')
      document.getElementById('tab-reapply').classList.toggle('active', tab === 'reapply')
      selectedId = null
      renderQueue()
      const filtered = filteredQueue()
      if (filtered.length > 0) {
        selectApplicant(filtered[0].id)
      } else {
        document.getElementById('detail-panel').innerHTML =
          '<div class="detail-placeholder">此類別目前無待審核申請</div>'
      }
    }

    // ── Render Queue ───────────────────────────────────────────────────────────
    function renderQueue() {
      const list  = document.getElementById('queue-list')
      const count = document.getElementById('queue-count')

      // Update tab counts
      const firstCount   = queue.filter(a => (a.application_count || 1) <= 1).length
      const reapplyCount = queue.filter(a => (a.application_count || 1) > 1).length
      document.getElementById('tab-count-first').textContent   = firstCount
      document.getElementById('tab-count-reapply').textContent = reapplyCount
      count.textContent = queue.length === 0 ? '沒有待審核申請' : `共 ${queue.length} 筆等待中`

      const visible = filteredQueue()

      if (visible.length === 0) {
        list.innerHTML = '<li class="queue-empty">此類別目前無待審核申請</li>'
        return
      }

      list.innerHTML = visible.map((a) => {
        const emoji = a.gender === 'female' ? '👩' : a.gender === 'male' ? '👨' : '🧑'
        const isActive = a.id === selectedId
        const isReapply   = a.application_count > 1
        const isFinalAttempt = a.application_count >= MAX_ATTEMPTS
        return `
          <li class="queue-item ${isActive ? 'active' : ''}"
              onclick="selectApplicant('${a.id}')"
              title="快捷鍵：↑↓ 切換">
            <div class="queue-avatar-placeholder">${emoji}</div>
            <div class="queue-info">
              <div class="queue-name">${escapeHtml(a.display_name)}</div>
              <div class="queue-meta">${calcAge(a.birth_date)} 歲 · ${escapeHtml(GENDER_LABELS[a.gender] || a.gender)}</div>
              <div class="queue-meta">${timeAgo(a.created_at)}</div>
            </div>
            ${isReapply
              ? `<span class="queue-badge ${isFinalAttempt ? 'queue-badge-final' : 'queue-badge-reapply'}">${a.application_count} / ${MAX_ATTEMPTS}</span>`
              : ''
            }
          </li>
        `
      }).join('')
    }

    // ── Select Applicant ───────────────────────────────────────────────────────
    async function selectApplicant(id) {
      if (id === selectedId) return
      selectedId      = id
      decisionMode    = null
      selectedTier    = null
      selectedRejType = null
      reviewStartedAt = new Date().toISOString()
      startReviewTimer()

      renderQueue()

      // Loading state
      document.getElementById('detail-panel').innerHTML = `
        <div class="loading-state" style="flex:1;">
          <div class="loading-spinner"></div>
          載入申請資料...
        </div>
      `

      // Fetch full application data
      const { data: app, error } = await db
        .from('applications')
        .select('*')
        .eq('id', id)
        .single()

      if (error || !app) {
        showToast('載入失敗：' + (error?.message || '未知錯誤'), 'error')
        return
      }

      // Fetch identity verification
      const { data: verify } = await db
        .from('identity_verifications')
        .select('*')
        .eq('user_id', app.user_id)
        .maybeSingle()

      currentVerify = verify

      // Fetch signed URLs for application photos (parallel)
      const photoUrlPromises = (app.photo_paths || []).map((path, i) =>
        getSignedUrl('application-photos', path).then(url => ({ url, path, i }))
      )
      const photoResults = await Promise.all(photoUrlPromises)

      // Fetch signed URLs for verification photos (parallel)
      let verifyUrls = {}
      if (verify) {
        const fields = ['front_face_path', 'side_face_path', 'action1_path', 'action2_path']
        const verifyPromises = fields.map(f =>
          verify[f] ? getSignedUrl('verification-photos', verify[f]).then(url => [f, url]) : Promise.resolve([f, null])
        )
        const verifyResults = await Promise.all(verifyPromises)
        verifyUrls = Object.fromEntries(verifyResults)
      }

      renderDetail(app, photoResults, verifyUrls)
    }

    // ── Render Detail ──────────────────────────────────────────────────────────
    function renderDetail(app, photoResults, verifyUrls) {
      const age  = calcAge(app.birth_date)
      const genderLabel = escapeHtml(GENDER_LABELS[app.gender] || app.gender)
      const seekingArr  = (app.seeking || []).map(s => escapeHtml(SEEKING_LABELS[s] || s))
      const seekingText = seekingArr.join('、') || '未設定'

      const photosHtml = photoResults.length > 0
        ? `<div class="photos-row">
            ${photoResults.map(({ url, i }) =>
              url
                ? `<img class="photo-thumb"
                        src="${url}"
                        alt="照片 ${i+1}"
                        onclick="openLightbox('${url}', '申請照片 ${i+1}')">`
                : `<div class="photo-placeholder">無法載入</div>`
            ).join('')}
           </div>`
        : `<div style="color:var(--text-second);font-size:13px;padding:8px 0;">無照片</div>`

      const verifyHtml = currentVerify ? `
        <div class="verify-grid">
          ${['front_face_path','side_face_path','action1_path','action2_path'].map(field => {
            const url     = verifyUrls[field]
            const isAction = field.startsWith('action')
            const codeField = field.replace('_path', '_code')
            const label   = field === 'front_face_path' ? '正面'
              : field === 'side_face_path' ? '側臉'
              : `動作：${actionLabel(currentVerify[codeField])}`

            return `
              <div class="verify-photo-wrapper">
                ${url
                  ? `<img class="photo-thumb" src="${url}" alt="${label}"
                          onclick="openLightbox('${url}', '${label}')">`
                  : `<div class="photo-placeholder" style="height:150px;">無法載入</div>`
                }
                <div class="verify-label">${label}</div>
              </div>
            `
          }).join('')}
        </div>
      ` : `<div style="color:var(--text-second);font-size:13px;padding:8px 0;">尚未提交認證照片</div>`

      const bioHtml = app.bio
        ? `<div class="bio-text">${escapeHtml(app.bio).replace(/\n/g,'<br>')}</div>`
        : `<div class="bio-text bio-empty">（未填寫自我介紹）</div>`

      // 上次備註已整合進 reapplyBanner，此處不重複顯示
      const prevNoteHtml = ''

      // ── Re-applicant context banner（第 2 次以上申請才顯示）
      const isLastAttempt = app.application_count >= MAX_ATTEMPTS
      const reapplyBanner = app.application_count > 1 ? `
        <div class="reapply-banner ${isLastAttempt ? 'reapply-banner-final' : ''}">
          <div class="reapply-count-badge ${isLastAttempt ? 'reapply-count-final' : ''}">
            第 ${app.application_count} / ${MAX_ATTEMPTS} 次
          </div>
          <div class="reapply-context">
            ${app.rejection_type
              ? `<div class="reapply-type-badge reapply-type-${app.rejection_type}">
                   上次：${REJECTION_TYPE_LABELS[app.rejection_type] || app.rejection_type}
                 </div>`
              : ''
            }
            <div class="reapply-prev-note">
              ${app.review_note
                ? escapeHtml(app.review_note)
                : '<span style="opacity:0.4;">上次無備註</span>'
              }
            </div>
          </div>
        </div>
      ` : ''

      document.getElementById('detail-panel').innerHTML = `

        ${reapplyBanner}

        <!-- Header -->
        <div class="applicant-header">
          <div>
            <div class="applicant-name">${escapeHtml(app.display_name)}</div>
            <div class="applicant-tags">
              <span class="tag">${age} 歲</span>
              <span class="tag">${genderLabel}</span>
              <span class="tag">${seekingText}</span>
              <span class="tag" style="color:var(--text-second);">申請於 ${timeAgo(app.created_at)}</span>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-second);text-align:right;line-height:1.8;">
            <div>${formatDate(app.created_at)}</div>
            <div style="margin-top:4px;">${app.user_id.slice(0,8)}…</div>
            <div style="margin-top:6px;display:flex;align-items:center;gap:4px;justify-content:flex-end;">
              <span style="opacity:0.45;">⏱</span>
              <span id="review-timer" style="font-size:12px;font-variant-numeric:tabular-nums;color:var(--text-second);">00:00</span>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="detail-body">

          <!-- Application Photos -->
          <div>
            <div class="section-title" style="margin-bottom:10px;">
              申請照片（${photoResults.length} 張）
              <span style="font-weight:400;color:var(--text-second);margin-left:6px;">點擊可開啟全螢幕</span>
            </div>
            ${photosHtml}
          </div>

          <!-- Verification Photos -->
          <div>
            <div class="section-title" style="margin-bottom:10px;">真人認證</div>
            ${verifyHtml}
          </div>

          <!-- Bio -->
          <div>
            <div class="section-title" style="margin-bottom:8px;">自我介紹</div>
            ${bioHtml}
          </div>

          ${prevNoteHtml}

        </div>

        <!-- Decision Panel -->
        <div class="decision-panel">

          <label class="review-note-label" id="review-note-label">內部備註（不對用戶顯示）</label>
          <textarea
            class="decision-note"
            id="review-note"
            placeholder="內部備註（不對用戶顯示）"
          ></textarea>

          <!-- Main action buttons -->
          <div class="decision-actions">
            <button class="btn-approve" id="btn-approve" onclick="startApprove()">✓ 通過</button>
            <button class="btn-reject"  id="btn-reject"  onclick="startReject()">✗ 拒絕</button>
          </div>

          <!-- Approve: tier picker -->
          <div id="approve-panel" class="pick-panel hidden">
            <div class="pick-cards">
              <button class="pick-btn pick-btn-approve" data-tier="top" onclick="selectTier('top')">
                <span class="pick-main">前 85%</span>
                <span class="pick-sub">終生免費</span>
              </button>
              <button class="pick-btn pick-btn-approve" data-tier="standard" onclick="selectTier('standard')">
                <span class="pick-main">85% 以外</span>
                <span class="pick-sub">標準方案</span>
              </button>
            </div>
            <button class="btn-confirm btn-confirm-approve" id="btn-confirm-approve"
                    disabled onclick="confirmApprove()">確認通過</button>
          </div>

          <!-- Reject: type picker -->
          <div id="reject-panel" class="pick-panel hidden">
            <div class="pick-cards">
              <button class="pick-btn pick-btn-reject" data-type="soft" onclick="selectRejType('soft')">
                <span class="pick-main">差一點</span>
                <span class="pick-sub">給予改善建議 · 30 天後可重申請</span>
              </button>
              <button class="pick-btn pick-btn-reject" data-type="hard" onclick="selectRejType('hard')">
                <span class="pick-main">不通過</span>
                <span class="pick-sub">純粹不符合標準</span>
              </button>
            </div>
            <button class="btn-confirm btn-confirm-reject" id="btn-confirm-reject"
                    disabled onclick="confirmReject()">確認拒絕</button>
          </div>

          <div class="shortcut-hint">A 通過 · R 拒絕 · 1/2 選擇 · Enter 確認 · ↑↓ 切換</div>

        </div>
      `

      // Wheel → horizontal scroll on photos row
      const photosRow = document.querySelector('.photos-row')
      if (photosRow) {
        photosRow.addEventListener('wheel', e => {
          if (e.deltaY !== 0) {
            e.preventDefault()
            photosRow.scrollLeft += e.deltaY
          }
        }, { passive: false })
      }
    }

    // ── Decision: Approve ──────────────────────────────────────────────────────
    function startApprove() {
      decisionMode = 'approve'
      selectedTier = null
      document.getElementById('btn-approve').classList.add('active')
      document.getElementById('btn-reject').classList.remove('active')
      document.getElementById('approve-panel').classList.remove('hidden')
      document.getElementById('reject-panel').classList.add('hidden')
      document.querySelectorAll('.pick-btn-approve').forEach(b => b.classList.remove('selected'))
      document.getElementById('btn-confirm-approve').disabled = true
      _resetNoteLabel()
    }

    function selectTier(tier) {
      selectedTier = tier
      document.querySelectorAll('.pick-btn-approve').forEach(b =>
        b.classList.toggle('selected', b.dataset.tier === tier)
      )
      document.getElementById('btn-confirm-approve').disabled = false
    }

    async function confirmApprove() {
      if (!selectedTier || isSubmitting) return
      isSubmitting = true

      const note = document.getElementById('review-note')?.value.trim()
      const name = queue.find(a => a.id === selectedId)?.display_name || '用戶'
      const btn  = document.getElementById('btn-confirm-approve')

      btn.textContent = '送出中...'
      btn.disabled = true

      let freshToken
      try { freshToken = await getFreshToken() } catch { isSubmitting = false; return }

      const { data: result, error: invokeError } = await db.functions.invoke('review-application', {
        body: {
          application_id:    selectedId,
          action:            'approve',
          quality_tier:      selectedTier,
          review_note:       note || null,
          review_started_at: reviewStartedAt,
        },
        headers: { Authorization: `Bearer ${freshToken}` },
      })

      if (invokeError) {
        const status = invokeError.context?.status
        if (status === 401) {
          showToast('登入已過期，請重新登入', 'error')
          setTimeout(() => window.location.href = 'index.html', 1500)
          isSubmitting = false
          return
        }
        const errMsg = invokeError.message || '未知錯誤'
        showToast('審核送出失敗：' + errMsg, 'error')
        btn.textContent = '確認通過 →'
        btn.disabled = false
        isSubmitting = false
        return
      }

      const tierLabel = selectedTier === 'top' ? '前85%（終生免費）' : '85%以外（標準方案）'
      showToast(`✓ 已通過 ${name}（${tierLabel}），通知已送出`, 'success')
      isSubmitting = false
      advanceQueue()
    }

    // ── Decision: Reject ───────────────────────────────────────────────────────
    function startReject() {
      decisionMode = 'reject'
      selectedRejType = null
      document.getElementById('btn-reject').classList.add('active')
      document.getElementById('btn-approve').classList.remove('active')
      document.getElementById('reject-panel').classList.remove('hidden')
      document.getElementById('approve-panel').classList.add('hidden')
      document.querySelectorAll('.pick-btn-reject').forEach(b => b.classList.remove('selected'))
      document.getElementById('btn-confirm-reject').disabled = true
      _resetNoteLabel()
    }

    function selectRejType(type) {
      selectedRejType = type
      document.querySelectorAll('.pick-btn-reject').forEach(b =>
        b.classList.toggle('selected', b.dataset.type === type)
      )
      document.getElementById('btn-confirm-reject').disabled = false

      // Dynamic textarea label: soft rejection note is user-visible
      const label    = document.getElementById('review-note-label')
      const textarea = document.getElementById('review-note')
      if (type === 'soft') {
        label.textContent = '給用戶的改善建議（建議填寫，會在 App 和 Email 中顯示）'
        label.classList.add('user-visible')
        textarea.placeholder = '例如：建議補充一張自然光戶外照，並在自我介紹加入更多個性描述...'
        textarea.classList.add('note-user-visible')
      } else {
        label.textContent = '內部備註（不對用戶顯示）'
        label.classList.remove('user-visible')
        textarea.placeholder = '內部備註（不對用戶顯示）'
        textarea.classList.remove('note-user-visible')
      }
    }

    function _resetNoteLabel() {
      const label    = document.getElementById('review-note-label')
      const textarea = document.getElementById('review-note')
      if (!label || !textarea) return
      label.textContent = '內部備註（不對用戶顯示）'
      label.classList.remove('user-visible')
      textarea.placeholder = '內部備註（不對用戶顯示）'
      textarea.classList.remove('note-user-visible')
    }

    async function confirmReject() {
      if (!selectedRejType || isSubmitting) return
      isSubmitting = true

      const note = document.getElementById('review-note')?.value.trim()
      const name = queue.find(a => a.id === selectedId)?.display_name || '用戶'
      const btn  = document.getElementById('btn-confirm-reject')

      btn.textContent = '送出中...'
      btn.disabled = true

      let freshToken
      try { freshToken = await getFreshToken() } catch { isSubmitting = false; return }

      const { data: result, error: invokeError } = await db.functions.invoke('review-application', {
        body: {
          application_id:    selectedId,
          action:            'reject',
          rejection_type:    selectedRejType,
          review_note:       note || null,
          review_started_at: reviewStartedAt,
        },
        headers: { Authorization: `Bearer ${freshToken}` },
      })

      if (invokeError) {
        const status = invokeError.context?.status
        if (status === 401) {
          showToast('登入已過期，請重新登入', 'error')
          setTimeout(() => window.location.href = 'index.html', 1500)
          isSubmitting = false
          return
        }
        const errMsg = invokeError.message || '未知錯誤'
        showToast('審核送出失敗：' + errMsg, 'error')
        btn.textContent = '確認拒絕 →'
        btn.disabled = false
        isSubmitting = false
        return
      }

      const typeLabel = REJECTION_TYPE_LABELS[selectedRejType] || selectedRejType
      showToast(`✗ 已拒絕 ${name}（${typeLabel}），通知已送出`, 'error')
      isSubmitting = false
      advanceQueue()
    }

    // ── Advance to next after decision ────────────────────────────────────────
    function advanceQueue() {
      stopReviewTimer()
      const visible  = filteredQueue()
      const prevIdx  = visible.findIndex(a => a.id === selectedId)
      queue          = queue.filter(a => a.id !== selectedId)
      selectedId     = null
      renderQueue()

      const nextVisible = filteredQueue()
      if (nextVisible.length > 0) {
        const nextIdx = Math.min(prevIdx, nextVisible.length - 1)
        selectApplicant(nextVisible[nextIdx].id)
      } else if (queue.length > 0) {
        document.getElementById('detail-panel').innerHTML =
          '<div class="detail-placeholder">此類別審核完畢，請切換至其他類別</div>'
      } else {
        document.getElementById('detail-panel').innerHTML =
          '<div class="detail-placeholder">✓ 所有申請審核完畢！</div>'
      }
    }

    // ── Lightbox ───────────────────────────────────────────────────────────────
    function openLightbox(url, caption) {
      document.getElementById('lightbox-img').src = url
      document.getElementById('lightbox-caption').textContent = caption || ''
      document.getElementById('lightbox').classList.remove('hidden')
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden')
      document.getElementById('lightbox-img').src = ''
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox()
    })

    // ── Keyboard Shortcuts ─────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      // Escape closes lightbox
      if (e.key === 'Escape') { closeLightbox(); return }

      // Don't intercept textarea/input
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return

      // Queue navigation
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        e.preventDefault()
        const visible = filteredQueue()
        const idx = visible.findIndex(a => a.id === selectedId)
        if (idx < visible.length - 1) selectApplicant(visible[idx + 1].id)
        return
      }
      if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        e.preventDefault()
        const visible = filteredQueue()
        const idx = visible.findIndex(a => a.id === selectedId)
        if (idx > 0) selectApplicant(visible[idx - 1].id)
        return
      }

      // Decision mode trigger
      if ((e.key === 'a' || e.key === 'A') && !decisionMode) {
        document.getElementById('btn-approve')?.click()
        return
      }
      if ((e.key === 'r' || e.key === 'R') && !decisionMode) {
        document.getElementById('btn-reject')?.click()
        return
      }

      // Tier / type selection
      if (decisionMode === 'approve') {
        if (e.key === '1') selectTier('top')
        if (e.key === '2') selectTier('standard')
        if (e.key === 'Enter') document.getElementById('btn-confirm-approve')?.click()
      }
      if (decisionMode === 'reject') {
        if (e.key === '1') selectRejType('soft')
        if (e.key === '2') selectRejType('hard')
        if (e.key === 'Enter') document.getElementById('btn-confirm-reject')?.click()
      }
    })

    init()
  </script>
</body>
</html>
